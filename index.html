<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Hub</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  text-align: center;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h1 {
  margin: 20px 0;
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 15px;
  margin: 10px 0;
  border-radius: 15px;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

a {
  color: white;
  text-decoration: none;
  font-size: 16px;
  display: block;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔗 Link Hub</h1>
  <div id="list"></div>
</div>

<script>
const API = "https://tiny-bar-b958.lingorm.workers.dev";

const icons = {
  ig: "📸",
  x: "🐦",
  douyin: "🎵",
  xhs: "📕",
  weibo: "🔥",
  other: "🔗"
};

fetch(API + "/list")
.then(res => res.json())
.then(data => {
  const list = document.getElementById("list");

  data.forEach(i => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div>${icons[i.platform] || "🔗"} ${i.title}</div>
      <small>🔥 ${i.click || 0}</small>
    `;

    // 👇 点击统计 + 跳转
    div.onclick = () => {
      fetch(API + "/click", {
        method: "POST",
        body: JSON.stringify({ id: i.id })
      });
      window.open(i.url);
    };

    list.appendChild(div);
  });
});
</script>

</body>
</html>
