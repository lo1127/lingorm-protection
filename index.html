<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LingOrm反黑链接</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  text-align: center;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h1 {
  margin: 20px 0;
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 15px;
  margin: 10px 0;
  border-radius: 15px;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

a {
  color: white;
  text-decoration: none;
  font-size: 16px;
  display: block;
}

/* 目录按钮 */
.menu-btn {
  position: absolute; /* 👈 改成 absolute */
  top: 10px;          /* 👈 往下移（你可以微调 60~90px） */
  right: 10px;        /* 👈 贴右一点 */
  font-size: 22px;
  background: rgba(255,255,255,0.2);
  padding: 6px 8px;
  border-radius: 8px;
  cursor: pointer;
  z-index: 10;        /* 👈 防止被遮挡 */
}

/* 抽屉 */
.drawer {
  position: absolute;   /* 👈 改这里 */
  right: 10px;          /* 👈 对齐按钮 */
  top: 55px;           /* 👈 在按钮下面 */
  width: 200px;

  background: #111;

  transform: translateY(-20px); /* 👈 改动画方向 */
  opacity: 0;
  pointer-events: none;

  transition: 0.25s ease;
  border-radius: 12px;  /* 👈 更像卡片 */
  z-index: 9;           /* 👈 在按钮下面，在卡片上面 */
}

.drawer.open {
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
}

.drawer a {
  display: block;
  margin: 15px 0;
  font-size: 14px;
}

</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div id="drawer" class="drawer">
 
  <a href="/submit.html">📤 投稿</a>

  <hr>

  <div style="opacity:.6;font-size:14px;margin-top:10px;">🔗链接分类</div>
<a href="index.html">全部</a>
  <a href="?p=weibo">微博</a>
  <a href="?p=ig">IG</a>
  <a href="?p=x">推特</a>
  <a href="?p=xhs">小红书</a>
  <a href="?p=douyin">抖音</a>
</div>

<div class="container">
  <h1>LingOrm反黑链接</h1>
  <div id="list"></div>
</div>

<script>
const API = "https://tiny-bar-b958.lingorm.workers.dev";

const icons = {
  ig: "📸",
  x: "🐦",
  douyin: "🎵",
  xhs: "📕",
  weibo: "🧣",
  other: "🔗"
};

const urlParams = new URLSearchParams(location.search);
const p = urlParams.get("p");

fetch(API + "/list")
.then(res => res.json())
.then(data => {

  if (p) {
    data = data.filter(i => i.platform === p);
  }
  const list = document.getElementById("list");

  data.forEach(i => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div>${icons[i.platform] || "🔗"} ${i.title}</div>
      <small>🔥 ${i.click || 0}</small>
    `;

    // 👇 点击统计 + 跳转
    div.onclick = () => {
      fetch(API + "/click?id=" + i.id, {
  method: "POST"
});
      window.open(i.url);
    };

    list.appendChild(div);
  });
});

function toggleMenu() {
  const d = document.getElementById("drawer");
  d.classList.toggle("open");
}

document.addEventListener("click", e => {
  const d = document.getElementById("drawer");
  if (!d.contains(e.target) && !e.target.classList.contains("menu-btn")) {
    d.classList.remove("open");
  }
});

</script>

</body>
</html>
