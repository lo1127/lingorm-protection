<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿</title>

<style>
*{box-sizing:border-box;}

:root{
  --bg1:#667eea;
  --bg2:#764ba2;
  --card:#ffffff;
  --text:#1f1f1f;
  --sub:#666;
  --border:#e5e5e7;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* 卡片 */
.card{
  width:90%;
  max-width:380px;
  background:var(--card);
  border-radius:18px;
  padding:22px 18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  animation:fade .4s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1}
}

.title{
  font-size:20px;
  font-weight:600;
  margin-bottom:6px;
}

.sub{
  font-size:13px;
  color:var(--sub);
  margin-bottom:18px;
}

/* 输入 */
.input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  margin-bottom:12px;
  font-size:14px;
  outline:none;
  transition:border .2s, box-shadow .2s;
}

.input:focus{
  border-color:#667eea;
  box-shadow:0 0 0 2px rgba(102,126,234,0.15);
}

/* 平台提示 */
.platform{
  font-size:13px;
  margin-bottom:12px;
  color:var(--sub);
}

/* 按钮 */
button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
  font-size:14px;
  cursor:pointer;
  transition:.15s;
}

button:active{
  transform:scale(.97);
}

button.loading{
  opacity:.7;
}

/* toast */
.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#fff;
  padding:10px 16px;
  border-radius:20px;
  opacity:0;
  transition:.3s;
}

.toast.show{
  opacity:1;
}
</style>
</head>

<body>

<div class="card">
  <div class="title">📤 提交链接</div>
  <div class="sub">支持微博 / IG / 推特 / 小红书 / 抖音</div>

  <input id="title" class="input" placeholder="写点标题（可选）">
  <input id="url" class="input" placeholder="粘贴链接">

  <div id="platform" class="platform">平台：-</div>

  <button id="btn" onclick="submit()">提交</button>
</div>

<div id="toast" class="toast"></div>

<script>
const API = "https://tiny-bar-b958.lingorm.workers.dev";

function detectPlatform(url){
  if(url.includes("weibo.com")) return ["weibo","🔥 微博"];
  if(url.includes("instagram.com")) return ["ig","📸 Instagram"];
  if(url.includes("x.com")||url.includes("twitter.com")) return ["x","🐦 推特"];
  if(url.includes("xiaohongshu.com")) return ["xhs","📕 小红书"];
  if(url.includes("douyin.com")) return ["douyin","🎵 抖音"];
  return ["other","🔗 未识别"];
}

function normalizeUrl(u){
  try{
    const url=new URL(u);
    url.search="";
    url.hash="";
    return url.toString().replace(/\/$/,"");
  }catch{
    return u;
  }
}

function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

document.getElementById("url").addEventListener("input",e=>{
  const [_,name]=detectPlatform(e.target.value);
  document.getElementById("platform").innerText="平台："+name;
});

function submit(){
  const btn=document.getElementById("btn");
  const urlInput=document.getElementById("url");
  const titleInput=document.getElementById("title");

  if(!urlInput.value){
    toast("请输入链接");
    return;
  }

  btn.classList.add("loading");
  btn.innerText="提交中...";

  const [p]=detectPlatform(urlInput.value);

  fetch(API+"/submit",{
    method:"POST",
    headers:{},
    body:JSON.stringify({
      title:titleInput.value||"未命名",
      url:normalizeUrl(urlInput.value),
      platform:p
    })
  })
  .then(res=>{
    if(!res.ok) throw new Error("duplicate");
    return res.text();
  })
  .then(()=>{
    toast("提交成功 🎉");
    titleInput.value="";
    urlInput.value="";
    document.getElementById("platform").innerText="平台：-";
  })
  .catch(err=>{
    if(err.message==="duplicate"){
      toast("⚠️ 已提交过");
    }else{
      toast("提交失败");
    }
  })
  .finally(()=>{
    btn.classList.remove("loading");
    btn.innerText="提交";
  });
}
</script>

</body>
</html>
