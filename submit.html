<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f6fa;
  text-align: center;
}

.box {
  margin: 50px auto;
  width: 90%;
  max-width: 400px;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  background: #667eea;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="box">
  <h2>提交链接</h2>
  <input id="title" placeholder="标题">
  <input id="url" placeholder="链接">
  <button onclick="submit()">提交</button>
</div>

<script>
const API = "https://tiny-bar-b958.lingorm.workers.dev";

function submit() {
  fetch(API + "/submit", {
    method: "POST",
    body: JSON.stringify({
      title: title.value,
      url: url.value,
      platform: "other"
    })
  }).then(() => {
    alert("提交成功，等待审核");
    title.value = "";
    url.value = "";
  });
}
</script>

</body>
</html>
