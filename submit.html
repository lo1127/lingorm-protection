<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f6fa;
  text-align: center;
}

.box {
  margin: 50px auto;
  width: 90%;
  max-width: 400px;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  background: #667eea;
  color: white;
  border: none;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 10px 18px;
  border-radius: 20px;
  font-size: 14px;
  opacity: 0;
  transition: 0.3s;
}

.toast.show {
  opacity: 1;
}
</style>
</head>

<body>

<div class="box">
  <h2>提交链接</h2>
  <input id="title" placeholder="标题">
  <input id="url" placeholder="链接">
  <button id="btn" onclick="submit()">提交</button>
</div>

<script>

function normalizeUrl(u) {
  try {
    const url = new URL(u);
    url.search = ""; // 去参数
    url.hash = "";   // 去 #
    return url.toString().replace(/\/$/, "");
  } catch {
    return u;
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function detectPlatform(url) {
  if (url.includes("weibo.com")) return "weibo";
  if (url.includes("instagram.com")) return "ig";
  if (url.includes("x.com") || url.includes("twitter.com")) return "x";
  if (url.includes("xiaohongshu.com")) return "xhs";
  if (url.includes("douyin.com")) return "douyin";
  return "other";
}

const API = "https://tiny-bar-b958.lingorm.workers.dev";

function submit() {

  const btn = document.getElementById("btn");
  btn.innerText = "提交中...";
  btn.disabled = true;

const urlInput = document.getElementById("url");
const titleInput = document.getElementById("title");

const p = detectPlatform(urlInput.value);

fetch(API + "/submit", {
  method: "POST",
  headers: {
    token: localStorage.getItem("token") || ""
  },
  body: JSON.stringify({
    title: titleInput.value,
    url: normalizeUrl(urlInput.value),
    platform: p
  })
});
  .then(res => {
    if (!res.ok) throw new Error("duplicate");
    return res.text();
  })
  .then(() => {
    showToast("提交成功");
    title.value = "";
    url.value = "";
  })
  .catch(err => {
    if (err.message === "duplicate") {
      showToast("⚠️ 已提交过");
    } else {
      showToast("提交失败");
    }
  })
  .finally(() => {
    btn.innerText = "提交";
    btn.disabled = false;
  });
}
</script>
<div id="toast" class="toast"></div>
</body>
</html>
