<input id="user" placeholder="账号">
<input id="pass" placeholder="密码" type="password">
<button onclick="login()">登录</button>

<script>
function login() {
  fetch(API + "/login", {
    method: "POST",
    body: JSON.stringify({
      user: user.value,
      pass: pass.value
    })
  })
  .then(res => res.json())
  .then(data => {
    localStorage.setItem("admin", data.user);
    location.href = "admin.html";
  });
}
</script>
