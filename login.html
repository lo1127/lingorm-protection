<input id="user" placeholder="账号">
<input id="pass" placeholder="密码" type="password">
<button onclick="login()">登录</button>

<script>
const API = "https://tiny-bar-b958.lingorm.workers.dev";

function login() {
  fetch(API + "/login", {
    method: "POST",
    body: JSON.stringify({
      user: document.getElementById("user").value,
      pass: document.getElementById("pass").value
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data === "fail") {
      alert("账号或密码错误");
      return;
    }

    localStorage.setItem("admin", data.user);
    location.href = "admin.html";
  })
  .catch(() => {
    alert("请求失败，请检查API地址");
  });
}
</script>
