<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LingOrm 后台</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color: #333;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h2 {
  color: white;
}

.card {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
/* 已查看卡片 */
.card.viewed {
  opacity: 0.5;
  filter: grayscale(0.6);
}

/* 已查看链接 */
.link-viewed {
  color: #aaa !important;
}

button {
  padding: 6px 12px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  background: #667eea;
  color: white;
}

button.danger {
  background: #ff4d4f;
}

input {
  padding: 8px;
  margin: 5px;
  border-radius: 6px;
  border: 1px solid #ddd;
}

a {
  color:#667eea;
  text-decoration:none;
  font-size:13px;
}

a:hover{
  text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<h2>📌 待审核</h2>
<button onclick="logout()">退出登录</button>
<select id="filter">
  <option value="">全部</option>
  <option value="weibo">微博</option>
  <option value="ig">IG</option>
  <option value="x">推特</option>
  <option value="xhs">小红书</option>
  <option value="douyin">抖音</option>
</select>
<div id="pending"></div>

<h2>✅ 已审核</h2>
<div id="approved"></div>

<div id="adminPanel">
  <h2>👥 管理员管理</h2>

  <div class="card">
    <input id="newUser" placeholder="账号">
    <input id="newPass" placeholder="密码">
    <button onclick="addAdmin()">添加管理员</button>
  </div>

  <div class="card">
    <button onclick="deleteSelected()" class="danger">批量删除</button>
    <div id="admins"></div>
  </div>
</div>

<h2>📊 点击统计</h2>
<canvas id="chart"></canvas>

</div>

<script>
const API = "https://tiny-bar-b958.lingorm.workers.dev";

// ===== 已查看记录 =====
let viewed = JSON.parse(localStorage.getItem("viewed_ids") || "[]");

function markViewed(id){
  if(!viewed.includes(id)){
    viewed.push(id);
    localStorage.setItem("viewed_ids", JSON.stringify(viewed));
  }
}

function isViewed(id){
  return viewed.includes(id);
}

// ===== 排序（未看优先）=====
function sortByViewed(list){
  return list.sort((a,b)=>{
    const av = isViewed(a.id) ? 1 : 0;
    const bv = isViewed(b.id) ? 1 : 0;
    return av - bv; // 未看(0)在前，已看(1)在后
  });
}

const TOKEN = localStorage.getItem("token");
let currentFilter = "";
if (!TOKEN) {
  alert("请先登录");
  location.href = "login.html";
}

const isSuper = true;

if (!isSuper) {
  document.getElementById("adminPanel").style.display = "none";
}

let selectedAdmins = [];

// ===== 待审核 =====
async function loadPending(){
  const res = await fetch(API+"/admin/list",{headers:{token: TOKEN}});
  const data = await res.json();
let list = data;
if (currentFilter) {
  list = data.filter(i => i.platform === currentFilter);
}
list = sortByViewed(list);
  const box = document.getElementById("pending");
  box.innerHTML="";

  list.forEach(i=>{
    const div=document.createElement("div");
div.setAttribute("data-id", i.id);
    div.className="card";
if(isViewed(i.id)){
  div.classList.add("viewed");
}
    div.innerHTML=`
  <b>${i.title}</b><br>

  <a href="${i.url}" target="_blank" class="${isViewed(i.id) ? 'link-viewed' : ''}" onclick="event.stopPropagation(); trackClick('${i.id}')">
    🔗 点击查看
  </a><br>

  <button onclick="action('approve','${i.id}')">通过</button>
  <button class="danger" onclick="action('delete','${i.id}')">删除</button>
`;
    box.appendChild(div);
  });
}

// ===== 已审核 =====
async function loadApproved(){
  const res = await fetch(API+"/admin/approved",{headers:{token: TOKEN}});
  const data = await res.json();
let list = data;
if (currentFilter) {
  list = data.filter(i => i.platform === currentFilter);
}
list = sortByViewed(list);
  const box = document.getElementById("approved");
  box.innerHTML="";

  list.forEach(i=>{
    const div=document.createElement("div");
div.setAttribute("data-id", i.id);
    div.className="card";
if(isViewed(i.id)){
  div.classList.add("viewed");
}
    div.innerHTML=`
  <b>${i.title}</b> 🔥${i.click||0}<br>

  <a href="${i.url}" target="_blank" class="${isViewed(i.id) ? 'link-viewed' : ''}" onclick="event.stopPropagation(); trackClick('${i.id}')">
    🔗 查看内容
  </a><br>

  <button class="danger" onclick="action('delete','${i.id}')">删除</button>
`;
    box.appendChild(div);
  });
}

// ===== 操作 =====
function action(type,id){
  if(type==="delete" && !confirm("确定删除？")) return;

  fetch(API+"/admin/"+type,{
    method:"POST",
    headers:{token: TOKEN},
    body:JSON.stringify({id})
  }).then(()=>{
    loadPending();
    loadApproved();
  });
}

// ===== 添加管理员 =====
function addAdmin(){
  fetch(API+"/admin/add",{
    method:"POST",
    headers:{token: TOKEN},
    body:JSON.stringify({
      user:newUser.value,
      pass:newPass.value
    })
  }).then(()=>{
    alert("添加成功");
    loadAdmins();
  });
}

// ===== 管理员列表 =====
async function loadAdmins(){
  if(!isSuper) return;

  const res = await fetch(API+"/admin/admins",{headers:{token: TOKEN}});
  const data = await res.json();

  const box = document.getElementById("admins");
  box.innerHTML="";

  data.forEach(a=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <input type="checkbox" onchange="toggleSelect('${a.user}',this)">
      ${a.user}
      <button class="danger" onclick="removeAdmin('${a.user}')">删除</button>
    `;
    box.appendChild(div);
  });
}

// ===== 单个删除 =====
function removeAdmin(user){
  fetch(API+"/admin/remove",{
    method:"POST",
    headers:{token: TOKEN},
    body:JSON.stringify({user})
  }).then(()=>loadAdmins());
}

// ===== 勾选 =====
function toggleSelect(user,el){
  if(el.checked){
    selectedAdmins.push(user);
  }else{
    selectedAdmins=selectedAdmins.filter(u=>u!==user);
  }
}

// ===== 批量删除 =====
function deleteSelected(){
  if(!confirm("批量删除管理员？")) return;

  selectedAdmins.forEach(user=>{
    fetch(API+"/admin/remove",{
      method:"POST",
      headers:{token: TOKEN},
      body:JSON.stringify({user})
    });
  });

  selectedAdmins=[];
  loadAdmins();
}

// ===== 图表 =====
async function loadChart(){
  const res = await fetch(API+"/list");
  const data = await res.json();

  new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:data.map(i=>i.title),
      datasets:[{
        label:"点击量",
        data:data.map(i=>i.click||0)
      }]
    }
  });
}

// 引入图表
const s=document.createElement("script");
s.src="https://cdn.jsdelivr.net/npm/chart.js";
s.onload=loadChart;
document.body.appendChild(s);

// 初始化
loadPending();
loadApproved();
loadAdmins();

document.getElementById("filter").onchange = (e) => {
  currentFilter = e.target.value;
  loadPending();
  loadApproved();
};

function logout() {
  localStorage.removeItem("token");
  location.href = "login.html";
}

function trackClick(id){
  markViewed(id); // ✅ 标记已看
// 👇 实时变灰（不刷新）
  // ✅ 精确匹配卡片
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if(card){
    card.classList.add("viewed");

    const link = card.querySelector("a");
    if(link){
      link.classList.add("link-viewed");
    }
  }

  fetch(API + "/click?id=" + id, {
    method: "POST"
  });
 // 👇 关键：重新排序
  setTimeout(()=>{
    loadPending();
    loadApproved();
  }, 100);
}

function trackClick(id){
  setTimeout(()=>{
    fetch(API + "/click?id=" + id);
  }, 300);
}

</script>

</body>
</html>
