<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f6fa;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.item {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

button {
  margin-right: 10px;
  padding: 6px 10px;
  border: none;
  border-radius: 5px;
}

.ok { background: #2ecc71; color: white; }
.del { background: #e74c3c; color: white; }
</style>
</head>

<body>

<div class="container">
  <h2>待审核列表</h2>
  <div id="list"></div>
</div>

<script>
const API = "https://tiny-bar-b958.lingorm.workers.dev";
const AUTH = localStorage.getItem("admin");

fetch(API + "/admin/list", {
 headers: { auth: AUTH }
})
.then(res => res.json())
.then(data => {
  const list = document.getElementById("list");

  data.forEach(i => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <b>${i.title}</b><br>
      <small>${i.url}</small><br><br>
    `;

    const ok = document.createElement("button");
    ok.className = "ok";
    ok.innerText = "通过";
    ok.onclick = () => action("approve", i.id);

    const del = document.createElement("button");
    del.className = "del";
    del.innerText = "删除";
    del.onclick = () => action("delete", i.id);

    div.appendChild(ok);
    div.appendChild(del);
    list.appendChild(div);
  });
});

function action(type, id) {
  fetch(API + "/admin/" + type, {
    method: "POST",
    headers: { auth: AUTH },
    body: JSON.stringify({ id })
  }).then(() => location.reload());
}
</script>

</body>
</html>
